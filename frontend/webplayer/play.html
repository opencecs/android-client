    <!-- Wails V3 兼容性层 - 子窗口通过 BroadcastChannel 与主窗口通信 -->
    <script type="module">
        // 创建与主窗口通信的频道
        const ipcChannel = new BroadcastChannel('wails-ipc-child');
        
        // 封装调用主窗口函数的方法
        window.callMainWindow = async (funcName, args = {}) => {
            return new Promise((resolve, reject) => {
                const requestId = Date.now().toString() + Math.random().toString(36).substr(2, 9);
                
                ipcChannel.postMessage({
                    type: 'ipc-request',
                    funcName: funcName,
                    args: args,
                    requestId: requestId
                });
                
                const timeout = setTimeout(() => {
                    reject(new Error('IPC timeout'));
                }, 10000);
                
                const handler = (event) => {
                    if (event.data && event.data.type === 'ipc-response' && event.data.requestId === requestId) {
                        clearTimeout(timeout);
                        ipcChannel.removeEventListener('message', handler);
                        if (event.data.error) {
                            reject(new Error(event.data.error));
                        } else {
                            resolve(event.data.result);
                        }
                    }
                };
                
                ipcChannel.addEventListener('message', handler);
            });
        };
        
        // 便捷函数：置顶窗口
        window.ToggleProjectionWindowTop = async (windowID) => {
            return window.callMainWindow('ToggleProjectionWindowTop', windowID);
        };
        
        // 便捷函数：排列窗口
        window.ArrangeProjectionWindows = async (params) => {
            return window.callMainWindow('ArrangeProjectionWindows', params);
        };
        
        console.log('[Wails V3] 子窗口通信层初始化完成');
        
        // 通知主窗口已就绪
        setTimeout(() => {
            console.log('[Wails V3] 子窗口已就绪');
        }, 500);
    </script>

<script>
var wheelState = {
    accumulatedDelta: 0,
    accumulatedDistance: 0,
    lastDirection: 0,
    scrollCount: 0,
    lastX: 0,
    lastY: 0,
    timer: null,
    baseDistance: 60,
    minDistance: 10
};

function getWheelDistance() {
    var count = Math.min(wheelState.scrollCount, 5);
    return count * 10;//Math.max(wheelState.baseDistance - count * 10, wheelState.minDistance);
}

function sendWheelScroll(direction, totalDistance, x, y) {
    if (!window.h5_lgair || !window.h5_lgair.fun_send_data_multi || !window.h5_lgair.trans_xy) {
        console.log('h5_lgair not ready');
        return;
    }
    try {
        var canvasEl = document.getElementById(window.h5_lgair.Canvas_id);
        var rect = canvasEl.getBoundingClientRect();
        var scrollDistance = direction * totalDistance;
        var lg = window.h5_lgair;
        var screenX = Math.round(x - rect.left);
        var screenY = Math.round(y - rect.top);
        var screenW = Math.round(rect.width);
        var screenH = Math.round(rect.height);
        var startPos = lg.trans_xy(x, y);
        var endPos, startY, endY;
        if (lg.be_Rotate) {
            endX = startPos.x - scrollDistance;
            endX = Math.max(0, Math.min(endX, lg.Canvas_width - 1));
            endPos = {x: endX, y: startPos.y};
        } else {
            endY = startPos.y + scrollDistance;
            endY = Math.max(0, Math.min(endY, lg.Canvas_height - 1));
            endPos = {x: startPos.x, y: endY};
        }
        var startData = {
            type: lg.SDL_EVENT_MSGTYPE_POINTSCLICK,
            data: {
                points: 1,
                action: lg.ACTION_POINTER_DOWN,
                nid: 0,
                p: [{x: startPos.x, y: startPos.y, id: 0}],
                sw: lg.Canvas_width,
                sh: lg.Canvas_height
            }
        };
        var stepCount = 6;
        var stepDelay = 10;
        var endCoord = lg.be_Rotate ? endPos.x : endPos.y;
        var startCoord = lg.be_Rotate ? startPos.x : startPos.y;
        var stepSize = (endCoord - startCoord) / stepCount;
        lg.fun_send_data_multi(startData);
        for (var i = 1; i <= stepCount; i++) {
            (function(index) {
                setTimeout(function() {
                    var currentCoord = Math.round(startCoord + stepSize * index);
                    lg.fun_send_data_multi({
                        type: lg.SDL_EVENT_MSGTYPE_POINTSCLICK,
                        data: {
                            points: 1,
                            action: lg.ACTION_MOVE,
                            nid: 0,
                            p: [{x: lg.be_Rotate ? currentCoord : startPos.x, y: lg.be_Rotate ? startPos.y : currentCoord, id: 0}],
                            sw: lg.Canvas_width,
                            sh: lg.Canvas_height
                        }
                    });
                }, index * stepDelay);
            })(i);
        }
        setTimeout(function() {
            lg.fun_send_data_multi({
                type: lg.SDL_EVENT_MSGTYPE_POINTSCLICK,
                data: {
                    points: 0,
                    action: lg.ACTION_POINTER_UP,
                    nid: 0,
                    p: [{x: endPos.x, y: endPos.y, id: 0}],
                    sw: lg.Canvas_width,
                    sh: lg.Canvas_height
                }
            });
        }, (stepCount + 1) * stepDelay);
        console.log('Wheel scroll:', {
            mouse: {x: x, y: y, screenX: screenX, screenY: screenY, screenW: screenW, screenH: screenH},
            rotate: lg.be_Rotate,
            lgCanvas: {w: lg.Canvas_width, h: lg.Canvas_height},
            start: startPos,
            end: endPos,
            distance: scrollDistance
        });
    } catch(e) {
        console.log('Wheel error:', e);
    }
 }

document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    window.h5_lgair && window.h5_lgair.sendCmdEvent && window.h5_lgair.sendCmdEvent("goBack");
 });

 function initWheelHandler() {
    if (!window.h5_lgair || !window.h5_lgair.trans_xy) {
        setTimeout(initWheelHandler, 100);
        return;
    }
    wheelState.wheelHandler = function(e) {
        e.preventDefault();
        var now = Date.now();
        var delta = e.deltaY > 0 ? 1 : -1;
        wheelState.lastX = e.clientX;
        wheelState.lastY = e.clientY;
        if (wheelState.lastDirection !== delta) {
            wheelState.accumulatedDelta = 0;
            wheelState.accumulatedDistance = 0;
            wheelState.scrollCount = 0;
            wheelState.lastDirection = delta;
        }
        wheelState.accumulatedDelta += Math.abs(e.deltaY);
        wheelState.scrollCount++;
        var currentDistance = getWheelDistance();
        wheelState.accumulatedDistance += currentDistance;
        if (wheelState.timer) clearTimeout(wheelState.timer);
        wheelState.timer = setTimeout(function() {
            if (wheelState.accumulatedDelta > 0 && wheelState.lastDirection !== 0) {
                sendWheelScroll(wheelState.lastDirection, wheelState.accumulatedDistance, wheelState.lastX, wheelState.lastY);
                wheelState.accumulatedDelta = 0;
                wheelState.accumulatedDistance = 0;
                wheelState.scrollCount = 0;
            }
        }, 100);
    };
    wheelState.wheelListener = wheelState.wheelHandler;
    document.addEventListener('wheel', wheelState.wheelListener, { passive: false });
    console.log('Wheel handler initialized');
 }

 initWheelHandler();

// 投屏窗口直接调用 bindings 置顶自己
function bindTopmostButton() {
    var topmostBtn = document.getElementById('ctr_topmost');
    if (!topmostBtn) {
        setTimeout(bindTopmostButton, 100);
        return;
    }
    
    // 检查 bindings 是否已加载
    if (typeof ToggleProjectionWindowTop !== 'function') {
        console.log('等待 bindings 加载...');
        setTimeout(bindTopmostButton, 100);
        return;
    }
    
    topmostBtn.addEventListener('click', function() {
        var btn = this;
        var isTopmost = btn.getAttribute('state') === '1';
        
        // 从 URL 获取正确的窗口 ID (DeviceIP_ContainerName)
        var urlParams = new URLSearchParams(window.location.search);
        var deviceIP = urlParams.get('shost') || '';
        var containerName = urlParams.get('container_name') || urlParams.get('rtc_i') || 'unknown';
        var windowID = deviceIP ? (deviceIP + '_' + containerName) : containerName;
        
        console.log('置顶按钮点击, deviceIP:', deviceIP, 'containerName:', containerName, 'windowID:', windowID);
        
        // 直接调用主窗口函数
        console.log('调用 ToggleProjectionWindowTop');
        ToggleProjectionWindowTop(windowID).then(result => {
            console.log('置顶结果:', result);
            if (result && result.success) {
                var newState = isTopmost ? '0' : '1';
                btn.setAttribute('state', newState);
                btn.style.backgroundColor = isTopmost ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 215, 0, 0.5)';
                var svg = document.getElementById('s_topmost');
                if (svg) {
                    svg.style.fill = isTopmost ? 'currentColor' : 'rgba(255, 215, 0, 0.9)';
                }
            }
        }).catch(function(err) {
            console.error('ToggleProjectionWindowTop 失败:', err);
            fallbackSetAlwaysOnTop(!isTopmost, btn, isTopmost);
        });
    });
    console.log('置顶按钮事件绑定完成');
}

// 降级方案：使用 wails window API
function fallbackSetAlwaysOnTop(enable, btn, wasTopmost) {
    try {
        if (window.wails && window.wails.window) {
            window.wails.window.setAlwaysOnTop(enable);
            var newState = wasTopmost ? '0' : '1';
            btn.setAttribute('state', newState);
            btn.style.backgroundColor = wasTopmost ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 215, 0, 0.5)';
            var svg = document.getElementById('s_topmost');
            if (svg) {
                svg.style.fill = wasTopmost ? 'currentColor' : 'rgba(255, 215, 0, 0.9)';
            }
        }
    } catch (e) {
        console.error('降级置顶失败:', e);
    }
}

// 排列按钮点击事件 - 智能排列所有投屏窗口
function bindArrangeButton() {
    var arrangeBtn = document.getElementById('ctr_arrange');
    if (!arrangeBtn) {
        setTimeout(bindArrangeButton, 100);
        return;
    }
    
    arrangeBtn.addEventListener('click', function() {
        var btn = this;
        console.log('排列按钮点击');
        
        // 直接调用主窗口函数
        ArrangeProjectionWindows({
            screenWidth: window.screen.availWidth,
            screenHeight: window.screen.availHeight
        }).then(function(result) {
            console.log('排列结果:', result);
            if (result && result.success) {
                btn.style.backgroundColor = 'rgba(0, 255, 127, 0.5)';
                setTimeout(function() {
                    btn.style.backgroundColor = '';
                }, 300);
            }
        }).catch(function(err) {
            console.error('排列失败:', err);
        });
    });
    console.log('排列按钮事件绑定完成');
}

// 延迟绑定确保 DOM 和 bindings 都已加载
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
        bindTopmostButton();
        bindArrangeButton();
    });
} else {
    setTimeout(function() {
        bindTopmostButton();
        bindArrangeButton();
    }, 200);
}

// 页面清理处理器
var cleanupHandlers = {
    _registered: false,
    
    register: function() {
        if (this._registered) return;
        window.addEventListener('unload', this.unloadHandler);
        window.addEventListener('beforeunload', this.beforeunloadHandler);
        this._registered = true;
    },
    
    unregister: function() {
        if (!this._registered) return;
        window.removeEventListener('unload', this.unloadHandler);
        window.removeEventListener('beforeunload', this.beforeunloadHandler);
        this._registered = false;
    },
    
    unloadHandler: function() {
        console.log('[BatchControl] 页面卸载，清理资源');
        cleanupHandlers.cleanupAll();
    },
    
    beforeunloadHandler: function() {
        console.log('[BatchControl] 页面即将关闭，清理资源');
        cleanupHandlers.cleanupAll();
    },
    
    cleanupAll: function() {
        if (typeof window.h5_lgair === 'object' && window.h5_lgair && typeof window.h5_lgair.destroy === 'function') {
            window.h5_lgair.destroy();
        }
        if (typeof window.destroyWailsIPC === 'function') {
            window.destroyWailsIPC();
        }
        if (typeof LGAIR_UI.stopAllTimers === 'function') {
            LGAIR_UI.stopAllTimers();
        } else if (typeof LGAIR_UI.stopProgress === 'function') {
            LGAIR_UI.stopProgress();
        }
        if (batchControlCheckTimer) {
            clearInterval(batchControlCheckTimer);
            batchControlCheckTimer = null;
        }
        BatchControl.close();
        VideoStreamProxy.close();
        if (wheelState.timer) {
            clearTimeout(wheelState.timer);
            wheelState.timer = null;
        }
        if (wheelState.wheelListener) {
            document.removeEventListener('wheel', wheelState.wheelListener);
            wheelState.wheelListener = null;
        }
        if (window._h5LgairMessageHandler) {
            window.removeEventListener('message', window._h5LgairMessageHandler);
            window._h5LgairMessageHandler = null;
        }
        cleanupHandlers.unregister();
    }
};

window.globalCleanup = function() {
    cleanupHandlers.unloadHandler();
};

cleanupHandlers.register();

</script>
