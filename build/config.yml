# This file contains the configuration for this project.
version: '3'

# This information is used to generate the build assets.
info:
  companyName: "MYT"
  productName: "MYTV3"
  productIdentifier: "com.MYT.v3"
  description: "MYT V3"
  copyright: "(c) 2026, MYT Network Ltd.co"
  comments: "MYT V3"
  version: "1.5.7"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: build\build_dev.bat
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

# File Associations
# More information at: https://v3.wails.io/noit/done/yet
