version: '3'

includes:
  common: ../Taskfile.yml

vars:
  # Signing configuration - edit these values for your project
  # SIGN_CERTIFICATE: "path/to/certificate.pfx"
  # SIGN_THUMBPRINT: "certificate-thumbprint"  # Alternative to SIGN_CERTIFICATE
  # TIMESTAMP_SERVER: "http://timestamp.digicert.com"
  #
  # Password is stored securely in system keychain. Run: wails3 setup signing

  # Docker image for cross-compilation with CGO (used when CGO_ENABLED=1 on non-Windows)
  CROSS_IMAGE: wails-cross

tasks:
  build:
    summary: Builds the application for Windows
    cmds:
      # Auto-detect CGO: if CGO_ENABLED=1, use Docker; otherwise use native Go cross-compile
      - task: '{{if and (ne OS "windows") (eq .CGO_ENABLED "1")}}build:docker{{else}}build:native{{end}}'
        vars:
          ARCH: '{{.ARCH}}'
          DEV: '{{.DEV}}'
    vars:
      # Default to CGO_ENABLED=0 if not explicitly set
      CGO_ENABLED: '{{.CGO_ENABLED | default "0"}}'

  build:rpa:lib:
    summary: 从源码编译 RPA 静态库 libmytrpc.a（MinGW）
    dir: rpa/libmytrpc
    env:
      PATH: '{{.LOCALAPPDATA}}\Microsoft\WinGet\Packages\BrechtSanders.WinLibs.POSIX.UCRT_Microsoft.Winget.Source_8wekyb3d8bbwe\mingw64\bin;{{.PATH}}'
    cmds:
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp stdafx.cpp -o stdafx.o
        platforms: [windows]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp PkgData.cpp -o PkgData.o
        platforms: [windows]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp RCore.cpp -o RCore.o
        platforms: [windows]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp libmytrpc.cpp -o libmytrpc.o
        platforms: [windows]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp NodeApi.cpp -o NodeApi.o
        platforms: [windows]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp jsoncpp/json_reader.cpp -o json_reader.o
        platforms: [windows]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp jsoncpp/json_value.cpp -o json_value.o
        platforms: [windows]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp jsoncpp/json_writer.cpp -o json_writer.o
        platforms: [windows]
      - cmd: ar -r libmytrpc.a stdafx.o PkgData.o RCore.o libmytrpc.o NodeApi.o json_reader.o json_value.o json_writer.o
        platforms: [windows]
      - cmd: powershell -Command "if(!(Test-Path '../lib')){New-Item -ItemType Directory '../lib' | Out-Null}; Copy-Item -Force libmytrpc.a ../lib/libmytrpc.a; Copy-Item -Force libmytrpc.h ../lib/libmytrpc.h"
        platforms: [windows]
      - cmd: powershell -Command "if(!(Test-Path 'C:/cgo_libs/mytrpc')){New-Item -ItemType Directory 'C:/cgo_libs/mytrpc' | Out-Null}; Copy-Item -Force libmytrpc.a 'C:/cgo_libs/mytrpc/libmytrpc.a'; Copy-Item -Force libmytrpc.h 'C:/cgo_libs/mytrpc/libmytrpc.h'"
        platforms: [windows]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp stdafx.cpp -o stdafx.o
        platforms: [linux, darwin]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp PkgData.cpp -o PkgData.o
        platforms: [linux, darwin]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp RCore.cpp -o RCore.o
        platforms: [linux, darwin]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp libmytrpc.cpp -o libmytrpc.o
        platforms: [linux, darwin]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp NodeApi.cpp -o NodeApi.o
        platforms: [linux, darwin]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp jsoncpp/json_reader.cpp -o json_reader.o
        platforms: [linux, darwin]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp jsoncpp/json_value.cpp -o json_value.o
        platforms: [linux, darwin]
      - cmd: g++ -c -O2 -std=c++11 -DWIN32 -DLIBMYTRPC_EXPORTS -I. -Ijsoncpp jsoncpp/json_writer.cpp -o json_writer.o
        platforms: [linux, darwin]
      - cmd: ar -r libmytrpc.a stdafx.o PkgData.o RCore.o libmytrpc.o NodeApi.o json_reader.o json_value.o json_writer.o
        platforms: [linux, darwin]
      - cmd: mkdir -p ../lib && cp libmytrpc.a ../lib/libmytrpc.a && cp libmytrpc.h ../lib/libmytrpc.h
        platforms: [linux, darwin]

  build:native:
    summary: Builds the application using native Go cross-compilation
    internal: true
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}-tags cgorpa -buildvcs=false -gcflags=all="-l"{{else}}-tags "cgorpa production devtools" -trimpath -buildvcs=false{{end}}'
      LDFLAGS: '{{if eq .DEV "true"}}-X edgeclient/updater.AppVersion=dev -X edgeclient/updater.BuildTime=unknown{{else}}-X edgeclient/updater.AppVersion=dev -X edgeclient/updater.BuildTime=unknown -w -s -H windowsgui{{end}}'
    env:
      GOOS: windows
      CGO_ENABLED: '{{.CGO_ENABLED | default "1"}}'
      GOARCH: '{{.ARCH | default ARCH}}'
    deps:
      - task: common:go:mod:tidy
      - task: build:rpa:lib
      - task: '{{if eq .SKIP_FRONTEND "true"}}build:skip:frontend{{else}}common:build:frontend{{end}}'
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          DEV:
            ref: .DEV
      - task: common:generate:icons
    cmds:
      - task: generate:syso
      - cmd: powershell -ExecutionPolicy Bypass -File build/windows/build_native.ps1 -BuildFlags "{{.BUILD_FLAGS}}" -BinDir "{{.BIN_DIR}}" -AppName "{{.APP_NAME}}" -CgoEnabled "{{.CGO_ENABLED | default "1"}}" -Arch "{{.ARCH | default ARCH}}" -Dev "{{.DEV}}"
        platforms: [windows]
      - cmd: go build -p 20 {{.BUILD_FLAGS}} -ldflags="{{.LDFLAGS}}" -o "{{.BIN_DIR}}/{{.APP_NAME}}.exe"
        platforms: [linux, darwin]
      - cmd: powershell Remove-item *.syso
        platforms: [windows]
      - cmd: rm -f *.syso
        platforms: [linux, darwin]

  build:skip:frontend:
    summary: No-op task to skip frontend build in dev mode (Vite dev server handles frontend)
    internal: true
    cmds:
      - cmd: echo "Skipping frontend build (Vite dev server running)"
        platforms: [windows]
      - cmd: echo "Skipping frontend build (Vite dev server running)"
        platforms: [linux, darwin]

  build:docker:
    summary: Cross-compiles for Windows using Docker with Zig (for CGO builds on non-Windows)
    internal: true
    deps:
      - task: common:build:frontend
      - task: common:generate:icons
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required for CGO cross-compilation. Please install Docker."
      - sh: docker image inspect {{.CROSS_IMAGE}} > /dev/null 2>&1
        msg: |
          Docker image '{{.CROSS_IMAGE}}' not found.
          Build it first: wails3 task setup:docker
    cmds:
      - task: generate:syso
      - docker run --rm -v "{{.ROOT_DIR}}:/app" {{.GO_CACHE_MOUNT}} {{.REPLACE_MOUNTS}} -e APP_NAME="{{.APP_NAME}}" -e LDFLAGS="{{.LDFLAGS}}" {{.CROSS_IMAGE}} windows {{.DOCKER_ARCH}}
      - docker run --rm -v "{{.ROOT_DIR}}:/app" alpine chown -R $(id -u):$(id -g) /app/bin
      - rm -f *.syso
    vars:
      DOCKER_ARCH: '{{.ARCH | default "amd64"}}'
      # Mount Go module cache for faster builds
      GO_CACHE_MOUNT:
        sh: 'echo "-v ${GOPATH:-$HOME/go}/pkg/mod:/go/pkg/mod"'
      # Extract replace directives from go.mod and create -v mounts for each
      REPLACE_MOUNTS:
        sh: |
          grep -E '^replace .* => ' go.mod 2>/dev/null | while read -r line; do
            path=$(echo "$line" | sed -E 's/^replace .* => //' | tr -d '\r')
            # Convert relative paths to absolute
            if [ "${path#/}" = "$path" ]; then
              path="$(cd "$(dirname "$path")" 2>/dev/null && pwd)/$(basename "$path")"
            fi
            # Only mount if directory exists
            if [ -d "$path" ]; then
              echo "-v $path:$path:ro"
            fi
          done | tr '\n' ' '
      LDFLAGS:
        sh: |
          python build/get_version.py 2>/dev/null | grep "^##vso\[task.setvariable variable=LDFLAGS;\]" | sed 's/##vso\[task.setvariable variable=LDFLAGS;\]//' || echo "-X edgeclient/updater.AppVersion=1.6.0 -X edgeclient/updater.BuildTime=unknown -w -s -H windowsgui"

  package:
    summary: Packages the application
    cmds:
      - task: '{{if eq (.FORMAT | default "nsis") "msix"}}create:msix:package{{else}}create:nsis:installer{{end}}'
    vars:
      FORMAT: '{{.FORMAT | default "nsis"}}'

  generate:syso:
    summary: Generates Windows `.syso` file
    dir: '{{.ROOT_DIR}}'
    cmds:
      - wails3 generate syso -arch {{.ARCH}} -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_{{.ARCH}}.syso
    vars:
      ARCH: '{{.ARCH | default ARCH}}'

  create:nsis:installer:
    summary: Creates an NSIS installer
    dir: build/windows/nsis
    deps:
      - task: build
    cmds:
      # Create the Microsoft WebView2 bootstrapper if it doesn't exist
      - wails3 generate webview2bootstrapper -dir "{{.ROOT_DIR}}/build/windows/nsis"
      - | 
        {{if eq OS "windows"}}
        makensis -DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.ROOT_DIR}}\{{.BIN_DIR}}\{{.APP_NAME}}.exe" project.nsi
        {{else}}
        makensis -DARG_WAILS_{{.ARG_FLAG}}_BINARY="{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" project.nsi
        {{end}}
    vars:
      ARCH: '{{.ARCH | default ARCH}}'
      ARG_FLAG: '{{if eq .ARCH "amd64"}}AMD64{{else}}ARM64{{end}}'

  create:msix:package:
    summary: Creates an MSIX package
    deps:
      - task: build
    cmds:
      - |-
        wails3 tool msix \
          --config "{{.ROOT_DIR}}/wails.json" \
          --name "{{.APP_NAME}}" \
          --executable "{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}.exe" \
          --arch "{{.ARCH}}" \
          --out "{{.ROOT_DIR}}/{{.BIN_DIR}}/{{.APP_NAME}}-{{.ARCH}}.msix" \
          {{if .CERT_PATH}}--cert "{{.CERT_PATH}}"{{end}} \
          {{if .PUBLISHER}}--publisher "{{.PUBLISHER}}"{{end}} \
          {{if .USE_MSIX_TOOL}}--use-msix-tool{{else}}--use-makeappx{{end}}
    vars:
      ARCH: '{{.ARCH | default ARCH}}'
      CERT_PATH: '{{.CERT_PATH | default ""}}'
      PUBLISHER: '{{.PUBLISHER | default ""}}'
      USE_MSIX_TOOL: '{{.USE_MSIX_TOOL | default "false"}}'

  install:msix:tools:
    summary: Installs tools required for MSIX packaging
    cmds:
      - wails3 tool msix-install-tools

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}.exe'

  sign:
    summary: Signs the Windows executable
    desc: |
      Signs the .exe with an Authenticode certificate.
      Configure SIGN_CERTIFICATE or SIGN_THUMBPRINT in the vars section at the top of this file.
      Password is retrieved from system keychain (run: wails3 setup signing)
    deps:
      - task: build
    cmds:
      - wails3 tool sign --input "{{.BIN_DIR}}/{{.APP_NAME}}.exe" {{if .SIGN_CERTIFICATE}}--certificate {{.SIGN_CERTIFICATE}}{{end}} {{if .SIGN_THUMBPRINT}}--thumbprint {{.SIGN_THUMBPRINT}}{{end}} {{if .TIMESTAMP_SERVER}}--timestamp {{.TIMESTAMP_SERVER}}{{end}}
    preconditions:
      - sh: '[ -n "{{.SIGN_CERTIFICATE}}" ] || [ -n "{{.SIGN_THUMBPRINT}}" ]'
        msg: "Either SIGN_CERTIFICATE or SIGN_THUMBPRINT is required. Set it in the vars section at the top of build/windows/Taskfile.yml"

  sign:installer:
    summary: Signs the NSIS installer
    desc: |
      Creates and signs the NSIS installer.
      Configure SIGN_CERTIFICATE or SIGN_THUMBPRINT in the vars section at the top of this file.
      Password is retrieved from system keychain (run: wails3 setup signing)
    deps:
      - task: create:nsis:installer
    cmds:
      - wails3 tool sign --input "build/windows/nsis/{{.APP_NAME}}-installer.exe" {{if .SIGN_CERTIFICATE}}--certificate {{.SIGN_CERTIFICATE}}{{end}} {{if .SIGN_THUMBPRINT}}--thumbprint {{.SIGN_THUMBPRINT}}{{end}} {{if .TIMESTAMP_SERVER}}--timestamp {{.TIMESTAMP_SERVER}}{{end}}
    preconditions:
      - sh: '[ -n "{{.SIGN_CERTIFICATE}}" ] || [ -n "{{.SIGN_THUMBPRINT}}" ]'
        msg: "Either SIGN_CERTIFICATE or SIGN_THUMBPRINT is required. Set it in the vars section at the top of build/windows/Taskfile.yml"
